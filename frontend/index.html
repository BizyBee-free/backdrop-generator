<!DOCTYPE html>\n<html>\n<head>\n    <title>Backdrop Generator</title>\n    <link rel=\"stylesheet\" href=\"styles.css\">\n</head>\n<body>\n    <div class=\"container\">\n        <h1>🎨 Backdrop Generator</h1>\n        <div id=\"uploadArea\" class=\"upload\">\n            <p>Drag & drop or click</p>\n            <input type=\"file\" id=\"fileInput\" accept=\"image/*\" hidden>\n        </div>\n        <form id=\"form\" style=\"display:none\">\n            <input type=\"text\" id=\"customerName\" placeholder=\"Name\" value=\"Backdrop\">\n            <select id=\"dpi\"><option>150</option><option>200</option><option>300</option></select>\n            <button type=\"submit\">Generate</button>\n        </form>\n        <div id=\"result\" style=\"display:none\">\n            <p id=\"resultText\"></p>\n            <a id=\"downloadBtn\">Download</a>\n        </div>\n    </div>\n    <script src=\"app.js\"></script>\n</body>\n</html>
